name: Deploy to Dev

on:
  push:
    branches:
      - main

# Prevent concurrent deploys to the same environment
concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  # ── CI gate ────────────────────────────────────────────────────────────────
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run backend unit tests
        run: |
          pip install pytest pytest-cov
          PYTHONPATH=backend/src python -m pytest backend/tests/ --cov=backend/src --cov-report=xml:backend/coverage.xml --cov-fail-under=80

  mobile-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json
      - name: Install mobile dependencies
        run: npm ci
      - name: Typecheck mobile app
        run: npm run typecheck

  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
      - name: Check formatting
        run: terraform fmt -check -recursive terraform
      - name: Initialize (no backend)
        run: terraform -chdir=terraform/environments/dev init -backend=false
      - name: Validate
        run: terraform -chdir=terraform/environments/dev validate

  # ── Deploy ─────────────────────────────────────────────────────────────────
  deploy-dev:
    runs-on: ubuntu-latest
    needs: [backend-tests, mobile-typecheck, terraform-validate]
    environment: dev
    permissions:
      id-token: write   # required for OIDC
      contents: read

    steps:
      - uses: actions/checkout@v4

      # Configure AWS credentials via OIDC (no long-lived keys).
      # Prerequisites:
      #   1. Create an IAM OIDC provider for token.actions.githubusercontent.com
      #   2. Create an IAM role trusted by the OIDC provider with the repo condition:
      #        repo:<org>/<repo>:environment:dev
      #   3. Attach a policy granting Lambda, API Gateway, Cognito, Secrets Manager,
      #      CloudWatch, IAM (scoped), and S3 (tfstate bucket) permissions.
      #   4. Set the GitHub secret AWS_DEPLOY_ROLE_ARN to the role ARN.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      # Build the Lambda deployment package the same way package-lambda.ps1 does.
      - name: Build Lambda package
        run: |
          mkdir -p terraform/environments/dev/build
          cd backend/src
          zip -r ../../terraform/environments/dev/build/orchestrator.zip .

      # Write a tfvars file from GitHub secrets / variables.
      # Add the corresponding secrets/vars to the GitHub "dev" environment:
      #   Required secrets:
      #     TF_BACKEND_BUCKET  — S3 bucket name for Terraform state
      #   Optional vars (fall back to safe defaults):
      #     AWS_REGION, MOCK_PROVIDER_MODE, TF_CORS_ORIGINS,
      #     TF_CALLBACK_URLS, TF_LOGOUT_URLS, TF_BEDROCK_MODEL_ID,
      #     TF_COGNITO_DOMAIN
      - name: Write terraform.tfvars
        run: |
          cat > terraform/environments/dev/terraform.tfvars <<EOF
          environment             = "dev"
          aws_region              = "${{ vars.AWS_REGION || 'us-east-1' }}"
          mock_provider_mode      = ${{ vars.MOCK_PROVIDER_MODE || 'true' }}
          cors_allow_origins      = [${{ vars.TF_CORS_ORIGINS || '"*"' }}]
          bedrock_router_model_id = "${{ vars.TF_BEDROCK_MODEL_ID || 'us.amazon.nova-pro-v1:0' }}"
          callback_urls           = [${{ vars.TF_CALLBACK_URLS || '' }}]
          logout_urls             = [${{ vars.TF_LOGOUT_URLS || '' }}]
          cognito_domain          = "${{ vars.TF_COGNITO_DOMAIN || 'ai-assistant-dev' }}"
          EOF

      - name: Write backend config
        run: |
          cat > terraform/environments/dev/backend.hcl <<EOF
          bucket  = "${{ secrets.TF_BACKEND_BUCKET }}"
          key     = "ai-assistant/dev/terraform.tfstate"
          region  = "${{ vars.AWS_REGION || 'us-east-1' }}"
          encrypt = true
          EOF

      - name: Terraform init
        run: terraform -chdir=terraform/environments/dev init -backend-config=backend.hcl

      - name: Terraform plan
        run: terraform -chdir=terraform/environments/dev plan -var-file=terraform.tfvars -out=tfplan

      - name: Terraform apply
        run: terraform -chdir=terraform/environments/dev apply -auto-approve tfplan

      # ── Derive mobile API URL from Terraform outputs ────────────────────────
      # Overwrites EXPO_PUBLIC_API_BASE_URL in mobile/.env so the value always
      # matches the deployed stage rather than a manually maintained constant.
      - name: Write EXPO_PUBLIC_API_BASE_URL to mobile/.env
        run: |
          BASE=$(terraform -chdir=terraform/environments/dev output -raw api_endpoint)
          STAGE=$(terraform -chdir=terraform/environments/dev output -raw stage_name 2>/dev/null || echo "dev")
          NEW_URL="$BASE/$STAGE"
          # Replace existing key if present, otherwise append.
          if grep -q "^EXPO_PUBLIC_API_BASE_URL=" mobile/.env; then
            sed -i "s|^EXPO_PUBLIC_API_BASE_URL=.*|EXPO_PUBLIC_API_BASE_URL=$NEW_URL|" mobile/.env
          else
            echo "EXPO_PUBLIC_API_BASE_URL=$NEW_URL" >> mobile/.env
          fi
          echo "Set EXPO_PUBLIC_API_BASE_URL=$NEW_URL"

      # ── Post-deploy smoke test ──────────────────────────────────────────────
      # Capture the API endpoint from Terraform output and verify /health returns
      # HTTP 200. Retries up to 5 times (30 s apart) to allow Lambda cold start.
      - name: Get API endpoint
        id: api
        run: |
          BASE=$(terraform -chdir=terraform/environments/dev output -raw api_endpoint)
          STAGE=$(terraform -chdir=terraform/environments/dev output -raw stage_name 2>/dev/null || echo "dev")
          echo "endpoint=$BASE/$STAGE" >> "$GITHUB_OUTPUT"

      - name: Smoke test — GET /health
        run: |
          API="${{ steps.api.outputs.endpoint }}"
          echo "Testing $API/health"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API/health")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed."
              exit 0
            fi
            sleep 30
          done
          echo "Health check failed after 5 attempts."
          exit 1

      - name: Smoke test — GET /v1/integrations
        run: |
          API="${{ steps.api.outputs.endpoint }}"
          echo "Testing $API/v1/integrations"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API/v1/integrations")
          echo "HTTP $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "Integrations endpoint passed."
          else
            echo "Integrations endpoint returned unexpected status $STATUS (non-fatal)."
          fi

      # TODO(T-27): POST /v1/chat/plan is in protected_routes in terraform/modules/http_api/main.tf,
      # so API Gateway enforces JWT authorisation before the request reaches Lambda.  A real Cognito
      # token is required — CI does not currently provision one.  Until a CI service-account token
      # is available (e.g. via aws cognito-idp initiate-auth with a dedicated smoke-test user whose
      # credentials are stored in GitHub secrets), this step is NON-BLOCKING: it warns on unexpected
      # responses but never fails the pipeline.
      # Once a token is wired the assertions to enforce are:
      #   - HTTP 200
      #   - Response body contains "intent" (valid PlanResponse shape, not a bare error string)
      - name: Smoke test — POST /v1/chat/plan (non-blocking, auth required)
        run: |
          API="${{ steps.api.outputs.endpoint }}"
          echo "Testing $API/v1/chat/plan"
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "$API/v1/chat/plan" \
            -H "Content-Type: application/json" \
            -d '{"message":"hello","providers":[]}')
          STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP $STATUS"
          echo "Body: $BODY"
          if [ "$STATUS" = "200" ]; then
            if echo "$BODY" | grep -q '"intent"'; then
              echo "POST /v1/chat/plan passed — response contains 'intent'."
            else
              echo "WARNING: HTTP 200 but response body does not contain 'intent'. Possible PlanResponse shape regression."
              echo "Response was: $BODY"
            fi
          elif [ "$STATUS" = "401" ] || [ "$STATUS" = "403" ]; then
            echo "WARNING: POST /v1/chat/plan returned $STATUS — JWT auth is enforced by API GW (expected until CI token is provisioned)."
          else
            echo "WARNING: POST /v1/chat/plan returned unexpected status $STATUS."
            echo "Response was: $BODY"
          fi
