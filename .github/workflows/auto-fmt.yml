name: Auto Format Terraform

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"

      - name: Run terraform fmt
        run: terraform fmt -recursive terraform

      - name: Show diff
        run: git diff

      - name: Create PR if changes exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet; then
            echo "No formatting changes needed. Nothing to commit."
            exit 0
          fi

          BRANCH="chore/auto-fmt-${{ github.run_id }}"

          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git checkout -b "$BRANCH"
          git add terraform/
          git commit -m "fix(terraform): apply terraform fmt formatting"
          git push origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: auto-format code" \
            --body "Automated formatting pass via workflow_dispatch. Review and merge to apply."
