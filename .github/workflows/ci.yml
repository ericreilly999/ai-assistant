name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test dependencies
        run: pip install -e "backend[test]"
      - name: Run backend unit tests
        run: |
          PYTHONPATH=backend/src python -m pytest backend/tests -v --tb=short \
            --cov=backend/src --cov-report=xml:backend/coverage.xml \
            --cov-report=term-missing --cov-fail-under=80

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 7

  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install ruff
        run: pip install ruff
      - name: Lint with ruff
        run: ruff check backend/src backend/tests

  backend-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install mypy
        run: pip install mypy
      - name: Type check with mypy
        run: mypy backend/src --ignore-missing-imports

  mobile-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json
      - name: Install mobile dependencies
        run: npm ci
      - name: Typecheck mobile app
        run: npm run typecheck

  terraform-validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, staging, prod]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
      - name: Check formatting
        run: terraform fmt -check -recursive terraform
      - name: Initialize
        run: terraform -chdir=terraform/environments/${{ matrix.environment }} init -backend=false
      - name: Validate
        run: terraform -chdir=terraform/environments/${{ matrix.environment }} validate
      - name: Install tflint
        run: |
          curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
      - name: Run tflint
        run: |
          tflint --init --config .tflint.hcl 2>/dev/null || true
          tflint --chdir=terraform/environments/${{ matrix.environment }}
      - name: Install checkov
        run: pip install checkov
      - name: Run checkov on terraform
        run: |
          # CKV_AWS_272: Lambda Code Signing — skipped because no AWS Signer signing profile
          # is configured yet; tracked as a pre-production security hardening follow-up.
          # CKV_AWS_116: Lambda Dead Letter Queue — skipped because this Lambda is invoked
          # synchronously via API Gateway; async DLQ configuration has no effect here.
          # CKV_AWS_50: Lambda X-Ray tracing — skipped because X-Ray adds per-request cost
          # and is deferred to post-MVP observability hardening; CloudWatch Logs cover interim tracing.
          checkov \
            -d terraform/environments/${{ matrix.environment }} \
            --framework terraform \
            --quiet \
            --compact \
            --skip-check CKV_AWS_272,CKV_AWS_116,CKV_AWS_50

  lambda-package-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build Lambda package
        run: |
          mkdir -p dist
          cd backend/src
          zip -r ../../dist/orchestrator.zip . -x "**/__pycache__/*" "**/*.pyc"
      - name: Validate package contents
        run: |
          unzip -l dist/orchestrator.zip | grep "assistant_app/handler.py"
          echo "Lambda package validated: handler entrypoint found."
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-package
          path: dist/orchestrator.zip
          retention-days: 7
