name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run backend unit tests
        run: |
          PYTHONPATH=backend/src python -m unittest discover -s backend/tests -t backend

  mobile-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json
      - name: Install mobile dependencies
        run: npm ci
      - name: Typecheck mobile app
        run: npm run typecheck

  terraform-validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, staging, prod]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
      - name: Check formatting
        run: terraform fmt -check -recursive terraform
      - name: Initialize
        run: terraform -chdir=terraform/environments/${{ matrix.environment }} init -backend=false
      - name: Validate
        run: terraform -chdir=terraform/environments/${{ matrix.environment }} validate